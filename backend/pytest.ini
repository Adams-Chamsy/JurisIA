# JurisIA — Configuration Pytest
[pytest]
testpaths       = tests
asyncio_mode    = auto
python_files    = test_*.py *_test.py
python_classes  = Test*
python_functions= test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    unit:        Tests unitaires (rapides, sans dépendances externes)
    integration: Tests d'intégration (nécessitent une BDD)
    e2e:         Tests end-to-end
    slow:        Tests lents (à skiper en développement rapide)
