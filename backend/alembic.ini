# ============================================================
# JurisIA — Configuration Alembic (Migrations de Base de Données)
# Documentation : https://alembic.sqlalchemy.org/
# Usage :
#   alembic upgrade head          — Appliquer toutes les migrations
#   alembic downgrade -1           — Annuler la dernière migration
#   alembic revision --autogenerate -m "description"  — Créer une migration
#   alembic history                — Voir l'historique
#   alembic current                — Migration active
# ============================================================

[alembic]
# Emplacement des scripts de migration
script_location = app/db/migrations

# Format des noms de fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone pour les timestamps dans les migrations
timezone = UTC

# Troncature des messages trop longs
truncate_slug_length = 40

# DATABASE_URL est lu depuis les variables d'environnement via env.py
# Ne pas mettre de credentials ici (fichier commité en git)
sqlalchemy.url =

[post_write_hooks]
# Hook optionnel : formatter Ruff sur les fichiers générés
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

# ── Configuration du Logging Alembic ──────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level    = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level     = WARN
handlers  =
qualname  = sqlalchemy.engine

[logger_alembic]
level     = INFO
handlers  =
qualname  = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format    = %(levelname)-5.5s [%(name)s] %(message)s
datefmt   = %H:%M:%S
