# ============================================
# JurisIA — Pipeline CI/CD GitHub Actions
# Tests + Lint + Build + Deploy (Staging auto / Prod manuel)
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─── JOB 1 : Lint & Tests Backend ────────────────────────────────────────────
jobs:
  backend-quality:
    name: 🐍 Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: jurisai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📥 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Lint avec Ruff
        run: ruff check app/ tests/

      - name: 📐 Format check avec Ruff
        run: ruff format --check app/ tests/

      - name: 🔒 Type checking avec Mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true  # Non bloquant en CI pour l'instant

      - name: 🧪 Tests unitaires + intégration
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/jurisai_test
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: test_secret_key_not_for_production
          JWT_SECRET_KEY: test_jwt_secret_key_not_for_production
          ENCRYPTION_KEY: dGhpcyBpcyBhIHRlc3Qga2V5IGZvciBjaS1jZCBvbmx5ISE=  # Base64 Fernet test key
          MISTRAL_API_KEY: "dummy_for_tests"
          STRIPE_SECRET_KEY: "sk_test_dummy"
          APP_ENV: development
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v \
            --tb=short

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: backend/coverage.xml
          flags: backend

# ─── JOB 2 : Lint & Tests Frontend ───────────────────────────────────────────
  frontend-quality:
    name: ⚡ Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Lint ESLint
        run: npm run lint

      - name: 📐 TypeScript check
        run: npm run type-check

      - name: 🧪 Tests unitaires
        run: npm run test -- --coverage --passWithNoTests

      - name: 🔨 Build de production
        env:
          NEXT_PUBLIC_API_URL: https://api.jurisai.fr/api/v1
          NEXT_PUBLIC_APP_URL: https://app.jurisai.fr
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
        run: npm run build

# ─── JOB 3 : Sécurité ────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Scan de Sécurité
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Snyk — Vulnerabilités Python
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/requirements.txt --severity-threshold=high

      - name: 🔍 Snyk — Vulnerabilités Node.js
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend/package.json --severity-threshold=high

      - name: 🔐 Bandit — Sécurité Python
        run: |
          pip install bandit
          bandit -r backend/app/ -ll -x backend/app/tests/ || true

# ─── JOB 4 : Deploy Staging (auto sur main/develop) ──────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    if: github.ref == 'refs/heads/develop' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    environment: staging

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build & Push image Backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy sur OVH Staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/jurisai-staging
            git pull origin develop
            docker compose pull
            docker compose up -d --force-recreate backend
            docker compose exec backend alembic upgrade head
            echo "✅ Staging déployé : $(date)"

      - name: 🧪 Smoke tests Staging
        run: |
          sleep 15  # Attendre que le service démarre
          curl -f https://staging-api.jurisai.fr/health || exit 1
          echo "✅ Smoke tests OK"

      - name: 💬 Notification Slack
        uses: slackapi/slack-github-action@v1
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Deploy staging : ${{ github.sha }} par ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# ─── JOB 5 : Deploy Production (manuel, nécessite approbation) ───────────────
  deploy-production:
    name: 🏭 Deploy → Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.jurisai.fr
    # Nécessite une approbation manuelle dans GitHub (configuré dans l'environnement)

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build & Push image Production
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

      - name: 🏭 Deploy Production (Blue/Green)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/jurisai-prod

            # Pull nouvelle image
            docker compose pull backend

            # Migrations BDD avant le déploiement
            docker compose run --rm backend alembic upgrade head

            # Redémarrage zero-downtime (rolling update)
            docker compose up -d --force-recreate --no-deps backend

            # Health check post-déploiement
            sleep 10
            curl -f http://localhost:8000/health || (docker compose rollback && exit 1)

            echo "✅ Production déployée : ${{ github.sha }}"

      - name: ✅ Health check Production
        run: |
          sleep 20
          curl -f https://api.jurisai.fr/health
          echo "Production opérationnelle ✅"

      - name: 📣 Notification déploiement production
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 *Production déployée* — Version : ${{ github.sha }} | Par : ${{ github.actor }} | ${{ github.event.head_commit.message }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
