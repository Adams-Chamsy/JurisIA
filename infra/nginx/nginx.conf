# ============================================================
# JurisIA — Configuration Nginx Production
# Reverse proxy + SSL + Compression + Cache + Sécurité
# Requiert : certbot pour les certificats Let's Encrypt
# ============================================================

# ── Limite de taux globale ──────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=60r/m;
limit_req_zone  $binary_remote_addr  zone=auth_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

# ── Upstream : Backend FastAPI ──────────────────────────────
upstream jurisai_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Upstream : Frontend Next.js ────────────────────────────
upstream jurisai_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ───────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name app.jurisai.fr api.jurisai.fr;

    # Vérification Let's Encrypt (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend : app.jurisai.fr ───────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name app.jurisai.fr;

    # ── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.jurisai.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.jurisai.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── HSTS ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Headers de Sécurité ────────────────────────────────
    add_header X-Frame-Options              "DENY"                      always;
    add_header X-Content-Type-Options       "nosniff"                   always;
    add_header X-XSS-Protection             "1; mode=block"             always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.jurisai.fr https://eu.posthog.com https://sentry.io;" always;

    # ── Compression ────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary       on;

    # ── Logging ────────────────────────────────────────────
    access_log /var/log/nginx/jurisai_frontend_access.log combined;
    error_log  /var/log/nginx/jurisai_frontend_error.log  warn;

    # ── Cache des assets statiques Next.js ────────────────
    location /_next/static/ {
        proxy_pass         http://jurisai_frontend;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass         http://jurisai_frontend;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── Proxy vers Next.js ─────────────────────────────────
    location / {
        limit_conn       conn_limit 20;

        proxy_pass       http://jurisai_frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # Next.js : disable buffering for SSE / streaming
        proxy_buffering off;
    }
}

# ── API Backend : api.jurisai.fr ────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name api.jurisai.fr;

    ssl_certificate     /etc/letsencrypt/live/api.jurisai.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jurisai.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options       "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_comp_level 6;
    gzip_types application/json;

    access_log /var/log/nginx/jurisai_api_access.log combined;
    error_log  /var/log/nginx/jurisai_api_error.log  warn;

    # ── Limite taille fichiers uploadés ────────────────────
    client_max_body_size 25m;

    # ── Health check : pas de rate limiting ───────────────
    location = /health {
        proxy_pass http://jurisai_backend/health;
        access_log off;
    }

    # ── Webhooks Stripe : pas de rate limiting ─────────────
    location /api/v1/billing/webhooks/stripe {
        proxy_pass         http://jurisai_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Auth : rate limiting strict ────────────────────────
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://jurisai_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Upload documents : timeout étendu ─────────────────
    location /api/v1/documents/analyze {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://jurisai_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # 2 min pour l'upload + analyse
        proxy_send_timeout 120s;
    }

    # ── API générale ───────────────────────────────────────
    location /api/ {
        limit_req   zone=api_limit burst=20 nodelay;
        limit_conn  conn_limit 30;

        proxy_pass         http://jurisai_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Bloquer les routes non définies ───────────────────
    location / {
        return 404;
    }
}
