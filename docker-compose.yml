# ============================================
# JurisIA — Docker Compose (Développement Local)
# Lance : PostgreSQL + Redis + MinIO (S3 local) + Qdrant
# Backend et Frontend tournent en local (hot reload)
# ============================================
# Usage : docker compose up -d

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jurisai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jurisai
      POSTGRES_PASSWORD: jurisai_dev_password
      POSTGRES_DB: jurisai_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jurisai -d jurisai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jurisai_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ""
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO (S3 local) ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: jurisai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web (http://localhost:9001)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO Init (crée le bucket automatiquement) ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: jurisai_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/jurisai-documents --ignore-existing;
      mc anonymous set none local/jurisai-documents;
      echo 'MinIO bucket créé : jurisai-documents';
      "
    restart: "no"

  # ── Qdrant (Vector Database pour RAG) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jurisai_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Adminer (Interface web PostgreSQL) ───────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: jurisai_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: "dracula"
    profiles: ["tools"]  # Lance uniquement avec : docker compose --profile tools up

# ── Volumes persistants ────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  qdrant_data:
    driver: local

# ── Réseau ────────────────────────────────────────────────────────────────────
networks:
  default:
    name: jurisai_network
